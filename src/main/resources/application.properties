# 1. Cấu hình server
server.port=8080

# 2. Cấu hình kết nối MySQL (Nhớ check port 3306 hay 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/tnqshop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình Hibernate để tự động tạo bảng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect